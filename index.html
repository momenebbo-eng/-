<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Engagement Invitation | Omar & Mariam</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

    body {
      background-color: #fcfaf8;
      font-family: 'Montserrat', sans-serif;
      color: #4a4a4a;
    }

    .hero-section {
      background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), 
                  url('https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      padding: 120px 0;
      text-align: center;
    }

    .couple-names {
      font-family: 'Dancing Script', cursive;
      font-size: 5rem;
      color: #c8a27c;
      margin: 20px 0;
    }

    .invitation-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8d6e63;
    }

    .card-invitation {
      background: white;
      border-radius: 0;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.05);
      border: 1px solid #eee;
      margin-top: -80px;
      position: relative;
    }

    .card-invitation::before {
      content: "";
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px solid #d4a373;
      pointer-events: none;
    }

    .date-box {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: bold;
      color: #333;
    }

    .countdown-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .countdown-item {
      background: #fdf8f3;
      padding: 15px;
      min-width: 90px;
      border: 1px solid #faedcd;
    }

    .countdown-item h3 {
      margin: 0;
      font-weight: bold;
      color: #c8a27c;
    }

    .btn-location {
      background-color: #c8a27c;
      border: none;
      padding: 15px 40px;
      font-weight: bold;
      letter-spacing: 1px;
      transition: 0.4s;
      border-radius: 0;
    }

    .btn-location:hover {
      background-color: #333;
      color: white;
    }

    footer {
      padding: 40px 0;
      font-style: italic;
      color: #999;
    }
  </style>
</head>
<body>

  <header class="hero-section">
    <div class="container">
      <p class="invitation-text">The Engagement of</p>
      <h1 class="couple-names">Omar & Mariam</h1>
      <p class="lead">Save the Date</p>
    </div>
  </header>

  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-md-8 text-center">
        <div class="card-invitation">
          <i class="bi bi-suit-heart text-muted fs-2 mb-4"></i>
          
          <h2 class="mb-4" style="font-family: 'Playfair Display';">Join us to celebrate</h2>
          
          <div class="date-box mb-2">March 27, 2026</div>
          <p class="fs-5 text-uppercase mb-5" style="letter-spacing: 3px;">At 8:00 PM</p>
          
          <div class="mb-5">
            <h4 class="fw-bold">LOCATION</h4>
            <p class="text-muted">
              <strong>Ratil garden</strong><br>
              Fleming, El Geish Rd, Alexandria, Egypt
            </p>
            <a href="https://maps.google.com/?cid=10101185451080442520&g_mp=CiVnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLkdldFBsYWNl" target="_blank" class="btn btn-dark btn-location mt-3">
              <i class="bi bi-geo-alt me-2"></i> VIEW ON GOOGLE MAPS
            </a>
          </div>

          <div class="pt-5 border-top">
            <p class="text-uppercase small fw-bold mb-4" style="letter-spacing: 2px;">Counting down to the big day</p>
            <div class="countdown-container" id="timer">
              <div class="countdown-item">
                <h3 id="days">--</h3>
                <small>Days</small>
              </div>
              <div class="countdown-item">
                <h3 id="hours">--</h3>
                <small>Hours</small>
              </div>
              <div class="countdown-item">
                <h3 id="minutes">--</h3>
                <small>Mins</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center">
    <p>We can't wait to see you there!</p>
    <p class="small">#OmarAndMariam2026</p>
  </footer>

  <script>
    // Set the date we're counting down to (Updated to 8:00 PM / 20:00:00)
    const countDownDate = new Date("March 27, 2026 20:00:00").getTime();

    // Update the count down every 1 second
    const x = setInterval(function() {
      const now = new Date().getTime();
      const distance = countDownDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;

      if (distance < 0) {
        clearInterval(x);
        document.getElementById("timer").innerHTML = "<h3>THE CELEBRATION HAS BEGUN!</h3>";
      }
    }, 1000);
  </script>
</body>
</html>
